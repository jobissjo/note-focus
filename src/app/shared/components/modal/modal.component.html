<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6">
  <!-- Backdrop -->
  <div 
    (click)="close.emit()"
    class="absolute inset-0 bg-neutral-950/40 backdrop-blur-md transition-opacity"
  ></div>

  <!-- Modal Content -->
  <div class="relative w-full max-w-lg bg-white dark:bg-neutral-900 rounded-3xl shadow-2xl overflow-hidden transform transition-all border border-neutral-200 dark:border-neutral-800">
    <div class="p-6">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-neutral-900 dark:text-white">{{ title }}</h2>
        <button 
          (click)="close.emit()"
          class="p-2 hover:bg-neutral-100 dark:hover:bg-neutral-800 rounded-xl text-neutral-500 transition-colors"
        >
          <lucide-icon [name]="'X'" class="h-5 w-5" />
        </button>
      </div>

      <ng-content></ng-content>
    </div>
  </div>
</div>
