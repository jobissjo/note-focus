<div class="h-full flex flex-col bg-white dark:bg-neutral-950">
  <!-- Top Bar -->
  <header class="h-14 border-b border-neutral-200 dark:border-neutral-800 flex items-center justify-between px-6 shrink-0 bg-white dark:bg-neutral-950">
    <div class="flex items-center gap-4 flex-1 min-w-0">
      <!-- Breadcrumbs -->
      <nav class="flex items-center gap-2 text-xs text-neutral-500 mr-4 shrink-0">
        @for (crumb of breadcrumbService.breadcrumbs(); track crumb.label; let last = $last) {
          @if (crumb.url) {
            <a [routerLink]="crumb.url" class="hover:text-indigo-500 transition-colors">{{ crumb.label }}</a>
          } @else {
            <span class="font-medium text-neutral-400">{{ crumb.label }}</span>
          }
          @if (!last) {
            <span class="text-neutral-300">/</span>
          }
        }
      </nav>

      <div class="h-4 w-px bg-neutral-200 dark:bg-neutral-800 mr-4 shrink-0"></div>

      <div class="text-xl shrink-0">{{ noteService.activeNote()?.emoji || '📄' }}</div>
      <input 
        [ngModel]="noteService.activeNote()?.title"
        (ngModelChange)="updateTitle($event)"
        class="bg-transparent border-none outline-none font-bold text-lg w-full focus:ring-0 placeholder:text-neutral-400 truncate"
        placeholder="Untitled Note"
      />
    </div>

    <div class="flex items-center gap-2">
      <div class="flex items-center gap-1.5 px-3 py-1.5 text-xs text-neutral-500 bg-neutral-100 dark:bg-neutral-800 rounded-lg">
         <lucide-icon [name]="isSaving() ? 'Loader2' : 'Clock'" [class.animate-spin]="isSaving()" class="h-3.5 w-3.5" />
         <span>{{ isSaving() ? 'Saving...' : 'Saved' }}</span>
      </div>
      <div class="w-px h-4 bg-neutral-200 dark:bg-neutral-800 mx-1"></div>
      <button class="p-2 hover:bg-neutral-100 dark:hover:bg-neutral-800 rounded-lg text-neutral-500 transition-colors">
        <lucide-icon [name]="'Share2'" class="h-4 w-4" />
      </button>
      <button class="p-2 hover:bg-neutral-100 dark:hover:bg-neutral-800 rounded-lg text-neutral-500 transition-colors">
        <lucide-icon [name]="'Maximize2'" class="h-4 w-4" />
      </button>
      <button 
        (click)="onDeleteNote()"
        class="p-2 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg text-red-500 transition-colors"
      >
        <lucide-icon [name]="'Trash2'" class="h-4 w-4" />
      </button>
    </div>
  </header>

  <!-- Editor Area -->
  <div class="flex-1 overflow-y-auto px-4 py-12 bg-neutral-50 dark:bg-neutral-950">
    <div class="max-w-4xl mx-auto">
      <div class="editor-container transition-all duration-300">
        @if (isBrowser) {
          <div class="sticky top-0 z-30 bg-neutral-50/80 dark:bg-neutral-950/80 backdrop-blur-xl pt-2 pb-6">
            <ngx-editor-menu [editor]="editor" [toolbar]="toolbar"></ngx-editor-menu>
          </div>
          <div class="prose dark:prose-invert max-w-none">
            <ngx-editor
              [editor]="editor"
              [ngModel]="content()"
              (ngModelChange)="onContentChange($event)"
              [placeholder]="'Write your story here...'"
            ></ngx-editor>
          </div>
        }
      </div>
    </div>
  </div>
</div>
