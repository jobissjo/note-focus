<div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden" style="background: var(--bg-base); font-family: var(--font-sans);">
  <!-- Background glow blobs -->
  <div class="absolute pointer-events-none" style="
    top: -20%; left: -10%;
    width: 50%; height: 50%;
    background: radial-gradient(circle, rgba(124,92,255,0.12) 0%, transparent 70%);
    filter: blur(60px);
  "></div>
  <div class="absolute pointer-events-none" style="
    bottom: -20%; right: -10%;
    width: 50%; height: 50%;
    background: radial-gradient(circle, rgba(124,92,255,0.08) 0%, transparent 70%);
    filter: blur(60px);
  "></div>

  <div class="w-full max-w-[400px] relative">
    <!-- Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex h-12 w-12 rounded-2xl items-center justify-center text-white mb-4 shadow-lg"
        style="background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%); box-shadow: 0 8px 24px var(--accent-glow);"
      >
        <lucide-icon [name]="'Notebook'" class="h-6 w-6" />
      </div>
      <h1 class="text-2xl font-bold tracking-tight" style="color: var(--text-primary);">Welcome back</h1>
      <p class="text-sm mt-1" style="color: var(--text-muted);">Sign in to your NoteFocus account</p>
    </div>

    <!-- Card -->
    <div class="rounded-2xl p-8" style="
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-lg);
    ">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <!-- Email -->
        <div class="space-y-1.5">
          <label class="text-xs font-semibold uppercase tracking-wide" style="color: var(--text-muted);">Email</label>
          <div class="relative">
            <lucide-icon [name]="'Mail'" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 pointer-events-none" style="color: var(--text-muted);" />
            <input 
              formControlName="email"
              type="email" 
              placeholder="name@example.com"
              class="w-full rounded-xl py-3 pl-10 pr-4 text-sm outline-none transition-all"
              style="background: var(--bg-base); border: 1px solid var(--border-subtle); color: var(--text-primary); font-family: var(--font-sans);"
            />
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-1.5">
          <div class="flex items-center justify-between">
            <label class="text-xs font-semibold uppercase tracking-wide" style="color: var(--text-muted);">Password</label>
            <a href="#" class="text-xs font-medium transition-colors" style="color: var(--accent);">Forgot password?</a>
          </div>
          <div class="relative">
            <lucide-icon [name]="'Lock'" class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 pointer-events-none" style="color: var(--text-muted);" />
            <input 
              formControlName="password"
              type="password" 
              placeholder="••••••••"
              class="w-full rounded-xl py-3 pl-10 pr-4 text-sm outline-none transition-all"
              style="background: var(--bg-base); border: 1px solid var(--border-subtle); color: var(--text-primary); font-family: var(--font-sans);"
            />
          </div>
        </div>

        <!-- Submit -->
        <button 
          [disabled]="loginForm.invalid || isLoading()"
          type="submit"
          class="w-full py-3 rounded-xl text-sm font-semibold text-white flex items-center justify-center gap-2 transition-all disabled:opacity-50 active:scale-[0.98]"
          style="background: var(--accent); box-shadow: 0 4px 16px var(--accent-glow); margin-top: 8px;"
          (mouseenter)="$any($event.currentTarget).style.opacity='0.9'"
          (mouseleave)="$any($event.currentTarget).style.opacity='1'"
        >
          @if (isLoading()) {
            <lucide-icon [name]="'Loader2'" class="h-4 w-4 animate-spin" />
            <span>Signing in...</span>
          } @else {
            <span>Sign In</span>
          }
        </button>
      </form>

      <p class="text-center text-sm mt-6" style="color: var(--text-muted);">
        Don't have an account?
        <a routerLink="/auth/register" class="font-semibold ml-1 transition-colors" style="color: var(--accent);">Create one</a>
      </p>
    </div>
  </div>
</div>
